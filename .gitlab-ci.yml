# .gitlab-ci.yml
stages:
  - build
  - test

variables:
  ANTLR_JAR: antlr-4.9.2-complete.jar

before_script:
  - apt-get update && apt-get install -y cmake g++ openjdk-11-jre
  - if [ ! -f "$ANTLR_JAR" ]; then wget https://www.antlr.org/download/antlr-4.9.2-complete.jar; fi

build:
  stage: build
  script:
    - mkdir -p build
    - cd build
    - cmake ..
    - cmake --build .
  artifacts:
    paths:
      - build/example
    expire_in: 1 hour

test:
  stage: test
  script:
    - cd build
    - ./example ../examples/valid/test1.txt
    - ./example ../examples/valid/test2.txt
  dependencies:
    - build